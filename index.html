<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- iOS fix: prevent auto-zoom on input focus, respect safe areas for notch/Dynamic Island -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />

    <title>Song Architect</title>
    <meta name="description" content="Turn your poems and lyrics into music. Song Architect generates optimized prompts for Suno and Udio so your words become songs." />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA: makes it feel native when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Song Architect" />

    <!-- iOS home screen icons (generated via manifest + these tags) -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Theme color for browser chrome on Android; black matches our dark UI -->
    <meta name="theme-color" content="#0d0d1a" />

    <!-- Preconnect to Google Fonts for faster load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
